<!DOCTYPE html>
<html>
<body>

<h1>Booking</h1>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>

<select id="service">
<option>Blouse</option>
<option>Designer Blouse</option>
<option>Fall & Pico</option>
</select><br>

<input type="date" id="date"><br>

<button onclick="sendData()">Submit</button>
<button onclick="receipt()">Receipt</button>

<script>
function sendData(){
let name=name.value;
let phone=phone.value;
let service=service.value;
let date=date.value;

let data={name,phone,service,date};

fetch("https://script.google.com/macros/s/AKfycby-7ZuwllktAWORzhw64YOc4caSPkkJNCLoUDyToM_jIBsNRHMHyrfWE_83ZeNrz03-/exec",{
method:"POST",
body:JSON.stringify(data)
});

window.open("https://wa.me/919966937346?text="+name);
}

function receipt(){
let r="SSV"+Math.floor(Math.random()*10000);
alert("Receipt: "+r);
}
</script>

</body>
</html>
